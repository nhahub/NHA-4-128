<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DermaScan AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f6;
      --surface: #ffffff;
      --text: #1c231f;
      --subtext: #6b7570;
      --border: #e2e4df;
      --accent: #6a5cff;
      --accent-2: #a259ff;
      --accent-soft: rgba(106, 92, 255, 0.10);
      --glow-a: rgba(79, 140, 255, 0.16);
      --glow-b: rgba(162, 89, 255, 0.16);
      --shadow: 0 1px 2px rgba(20, 25, 22, .04), 0 8px 24px rgba(20, 25, 22, .05);
      --bubble-user: #6a5cff;
      --bubble-user-text: #fff;
      --bubble-bot: #ffffff;
      --radius: 16px;
      --maxw: 760px;
    }

    html[data-theme="dark"] {
      --bg: #141815;
      --surface: #1c211d;
      --text: #ecefeb;
      --subtext: #9aa39c;
      --border: #2c322d;
      --accent: #8f7bff;
      --accent-2: #c084ff;
      --accent-soft: rgba(143, 123, 255, 0.14);
      --glow-a: rgba(79, 140, 255, 0.24);
      --glow-b: rgba(192, 132, 255, 0.22);
      --shadow: 0 1px 2px rgba(0, 0, 0, .3), 0 8px 24px rgba(0, 0, 0, .35);
      --bubble-bot: #1c211d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', 'Inter', sans-serif;
      transition: background .35s, color .35s;
    }

    html[lang="en"] body {
      font-family: 'Inter', sans-serif;
    }

    .glow {
      position: fixed;
      top: 20%;
      left: 50%;
      width: 60vw;
      height: 50vh;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, var(--glow-a) 0%, var(--glow-b) 45%, transparent 72%);
      filter: blur(10px);
      z-index: 0;
      pointer-events: none;
    }

    .topbar {
      position: relative;
      z-index: 2;
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 20px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .brand-mini {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
    }

    .brand-mini span {
      color: var(--accent);
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: .18s;
    }

    .pill-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    main {
      position: relative;
      z-index: 2;
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 24px 20px 140px;
      display: flex;
      flex-direction: column;
    }

    /* شاشة اختيار الدور */
    #roleScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
      gap: 18px;
    }

    .brand {
      font-family: 'Fraunces', serif;
      font-size: 40px;
      font-weight: 600;
      margin: 0;
      text-align: center;
    }

    .brand span {
      color: var(--accent);
    }

    .tagline {
      color: var(--subtext);
      font-size: 14.5px;
      text-align: center;
      margin: 0 0 20px;
    }

    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 480px;
    }

    .role-card {
      padding: 22px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      text-align: center;
      box-shadow: var(--shadow);
      transition: .18s;
      font-weight: 700;
      font-size: 15px;
    }

    .role-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
    }

    .role-card .emoji {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }

    /* واجهة الشات */
    #chatScreen {
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    .role-badge {
      align-self: flex-start;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 16px rgba(122, 92, 255, 0.35);
      margin-bottom: 6px;
    }

    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.7;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: var(--bubble-user-text);
      border-bottom-left-radius: 4px;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bubble-bot);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
    }

    .msg.system {
      align-self: center;
      color: var(--subtext);
      font-size: 12.5px;
      background: transparent;
      box-shadow: none;
      text-align: center;
    }

    .analysis-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: var(--surface);
    }

    .result-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      color: #fff;
      font-weight: 700;
      font-size: 13.5px;
      margin-bottom: 10px;
    }

    .result-mal {
      background: linear-gradient(135deg, #ff4d4d, #b30000);
    }

    .result-ben {
      background: linear-gradient(135deg, #28a745, #1e7e34);
    }

    .img-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }

    .img-row img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .img-row .cap {
      font-size: 11px;
      color: var(--subtext);
      text-align: center;
      margin-top: 3px;
    }

    .priority-box {
      padding: 10px 14px;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      font-size: 13.5px;
      margin-top: 8px;
      text-align: center;
    }

    .p1 {
      background: linear-gradient(135deg, #ff4d4d, #b30000);
    }

    .p2 {
      background: linear-gradient(135deg, #ff9800, #c96f00);
    }

    .p3 {
      background: linear-gradient(135deg, #28a745, #1e7e34);
    }

    .small-btn {
      margin-top: 10px;
      padding: 9px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 14px rgba(122, 92, 255, 0.35);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    .reg-form {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .reg-form input {
      flex: 1;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
    }

    .composer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 5;
      background: linear-gradient(180deg, transparent, var(--bg) 30%);
      padding: 18px 20px 22px;
    }

    .composer-inner {
      max-width: var(--maxw);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 8px 10px 8px 16px;
      box-shadow: var(--shadow);
    }

    .composer-inner input[type=text] {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14.5px;
      color: var(--text);
      font-family: inherit;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--subtext);
      cursor: pointer;
      font-size: 18px;
      padding: 6px;
      display: flex;
    }

    .send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 14px rgba(122, 92, 255, 0.4);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    #fileInput {
      display: none;
    }

    .typing {
      color: var(--subtext);
      font-size: 13px;
      font-style: italic;
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="topbar">
    <div class="brand-mini">Derma<span>Scan</span> AI</div>
    <div class="topbar-actions">
      <button class="pill-btn" id="themeToggle">🌙 <span id="themeLabel">Dark</span></button>
      <button class="pill-btn" id="langToggle">🌐 <span id="langLabel">English</span></button>
    </div>
  </div>

  <main>
    <!-- شاشة اختيار الدور -->
    <div id="roleScreen">
      <h1 class="brand">Derma<span>Scan</span> AI</h1>
      <p class="tagline" data-ar="مساعدك الذكي لصحة الجلد والتشخيص المبدئي"
        data-en="Your smart assistant for skin health and initial diagnosis">مساعدك الذكي لصحة الجلد والتشخيص المبدئي
      </p>
      <div class="role-grid">
        <div class="role-card" onclick="chooseRole('doctor')">
          <span class="emoji">🩺</span>
          <span data-ar="أنا طبيب" data-en="I'm a doctor">أنا طبيب</span>
        </div>
        <div class="role-card" onclick="chooseRole('patient')">
          <span class="emoji">🙂</span>
          <span data-ar="أنا مريض" data-en="I'm a patient">أنا مريض</span>
        </div>
      </div>
    </div>

    <!-- واجهة الشات -->
    <div id="chatScreen">
      <div class="role-badge" id="roleBadge"></div>
      <div id="messages" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>
  </main>

  <div class="composer" id="composer" style="display:none;">
    <div class="composer-inner">
      <button class="icon-btn" id="uploadBtn" title="Upload image">📎</button>
      <input type="file" id="fileInput" accept="image/*">
      <input type="text" id="textInput" data-ar-ph="اكتب رسالتك..." data-en-ph="Type your message..."
        placeholder="اكتب رسالتك...">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>

  <script>
    const API_BASE = "";  // نفس الأوريجن (السيرفر بيقدّم الواجهة والـ API معًا)
    const threadId = crypto.randomUUID();
    let currentRole = null;
    let lastAnalyzedFile = null;
    let lang = 'ar';
    let theme = 'light';

    const root = document.documentElement;
    const roleScreen = document.getElementById('roleScreen');
    const chatScreen = document.getElementById('chatScreen');
    const messagesEl = document.getElementById('messages');
    const composer = document.getElementById('composer');
    const roleBadge = document.getElementById('roleBadge');
    const textInput = document.getElementById('textInput');
    const fileInput = document.getElementById('fileInput');

    function applyTheme() {
      root.setAttribute('data-theme', theme);
      document.getElementById('themeToggle').innerHTML =
        (theme === 'dark' ? '☀️ <span>' + (lang === 'ar' ? 'فاتح' : 'Light') + '</span>'
          : '🌙 <span>' + (lang === 'ar' ? 'غامق' : 'Dark') + '</span>');
    }
    function applyLang() {
      root.setAttribute('lang', lang === 'ar' ? 'ar' : 'en');
      root.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      document.getElementById('langToggle').innerHTML =
        '🌐 <span>' + (lang === 'ar' ? 'English' : 'العربية') + '</span>';
      document.querySelectorAll('[data-ar]').forEach(el => {
        el.textContent = lang === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
      });
      textInput.placeholder = lang === 'ar' ? textInput.getAttribute('data-ar-ph') : textInput.getAttribute('data-en-ph');
      applyTheme();
    }
    document.getElementById('themeToggle').addEventListener('click', () => { theme = theme === 'light' ? 'dark' : 'light'; applyTheme(); });
    document.getElementById('langToggle').addEventListener('click', () => { lang = lang === 'ar' ? 'en' : 'ar'; applyLang(); });
    applyLang();

    function addMsg(html, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.innerHTML = html;
      messagesEl.appendChild(div);
      window.scrollTo(0, document.body.scrollHeight);
      return div;
    }

    async function chooseRole(role) {
      currentRole = role;
      const res = await fetch(`${API_BASE}/set-role`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ thread_id: threadId, role })
      }).then(r => r.json()).catch(e => ({ ok: false, error: String(e) }));

      roleScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      composer.style.display = 'block';

      roleBadge.textContent = role === 'doctor'
        ? (lang === 'ar' ? '🩺 دكتور' : '🩺 Doctor')
        : (lang === 'ar' ? '🙂 مريض' : '🙂 Patient');

      if (!res.ok) {
        addMsg('⚠️ ' + (res.error || 'server error'), 'system');
        return;
      }
      const welcome = role === 'doctor'
        ? '✅ ' + (lang === 'ar' ? 'دخلت كطبيب. تقدر ترفع صورة للمطابقة مع قاعدة البيانات، أو تسأل عن مريض/عائلة.' : 'Logged in as Doctor. Upload an image to match against the database, or ask about a patient/family.')
        : '✅ ' + (lang === 'ar' ? 'دخلت كمريض. ارفع صورة الجلد عشان تاخد تقرير ودرجة أولوية للحجز.' : 'Logged in as Patient. Upload a skin image to get a report and a booking priority.');
      addMsg(welcome, 'bot');
    }

    document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      lastAnalyzedFile = file;  // نحتفظ بالملف عشان زرار "تسجيل" يقدر يستخدمه حتى بعد ما نمسح الـ input
      addMsg((lang === 'ar' ? '📤 تم رفع صورة: ' : '📤 Uploaded image: ') + file.name, 'user');
      const typing = addMsg('<span class="typing">🔍 ' + (lang === 'ar' ? 'جارٍ التحليل...' : 'Analyzing...') + '</span>', 'bot');

      const fd = new FormData();
      fd.append('thread_id', threadId);
      fd.append('file', file);

      let data;
      try {
        data = await fetch(`${API_BASE}/analyze-image`, { method: 'POST', body: fd }).then(r => r.json());
      } catch (e) {
        typing.remove();
        addMsg('⚠️ ' + String(e), 'system');
        return;
      }
      typing.remove();

      if (!data.ok) {
        addMsg('⚠️ ' + data.error, 'system');
        return;
      }

      const badgeClass = data.label === 'Malignant' ? 'result-mal' : 'result-ben';
      const badgeText = data.label === 'Malignant'
        ? `⚠️ Malignant — ${data.confidence_pct}%`
        : `✔ Benign — ${data.confidence_pct}%`;

      let card = `<div class="analysis-card">
      <span class="result-badge ${badgeClass}">${badgeText}</span>
      <div class="img-row">
        <div><img src="data:image/png;base64,${data.images.original}"><div class="cap">Original</div></div>
        <div><img src="data:image/png;base64,${data.images.mask}"><div class="cap">Mask</div></div>
        <div><img src="data:image/png;base64,${data.images.overlay}"><div class="cap">Overlay</div></div>
      </div>
      <div>📊 ${lang === 'ar' ? 'المساحة المصابة' : 'Affected area'}: <b>${data.infection_pct}%</b></div>`;

      if (data.doctor) {
        if (data.doctor.matched) {
          card += `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
        <b>${lang === 'ar' ? '✅ الصورة مطابقة للمريض' : '✅ Matched patient'}: ${data.doctor.patient_id}</b>
        <div style="margin-top:6px;white-space:pre-wrap;">${data.doctor.report.replace(/\\n/g, '<br>')}</div>
      </div>`;
        } else {
          card += `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
        ${data.doctor.message}
        <div class="reg-form">
          <input type="text" id="pidInput" placeholder="${lang === 'ar' ? 'رقم المريض (مثال P0042)' : 'Patient ID (e.g. P0042)'}">
          <button class="small-btn" onclick="registerImage(this)">${lang === 'ar' ? 'تسجيل' : 'Register'}</button>
        </div>
      </div>`;
        }
      }

      if (data.patient) {
        const pClass = 'p' + data.patient.priority_degree;
        const cityOptions = ['القاهرة', 'الجيزة', 'الإسكندرية', 'المنصورة', 'أسوان'];
        card += `<div class="priority-box ${pClass}">
      🚑 ${data.patient.priority_label} — severity: ${data.patient.severity_score}
    </div>
    <div class="reg-form">
      <select id="cityInput" style="flex:1;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;">
        ${cityOptions.map(c => `<option value="${c}">${c}</option>`).join('')}
      </select>
      <button class="small-btn" onclick="bookAppointment(this)">📅 ${lang === 'ar' ? 'احجز موعد الآن' : 'Book appointment now'}</button>
    </div>`;
      }

      card += `</div>`;
      addMsg(card, 'bot');
      fileInput.value = '';  // آمن دلوقتي، الملف محفوظ في lastAnalyzedFile

      // متابعة تلقائية للـ agent (تقرير AI نصي) — بنفس لغة الواجهة الحالية
      const autoMsg = lang === 'ar'
        ? (data.label === 'Malignant'
          ? `رفعت صورة جلد، والذكاء الاصطناعي صنّفها Malignant بنسبة ثقة ${data.confidence_pct}% ومساحة مصابة ${data.infection_pct}%. ممكن تديني توصيات مفصّلة وخطوات تالية؟`
          : `رفعت صورة جلد، والذكاء الاصطناعي صنّفها Benign بمساحة مصابة ${data.infection_pct}%. إيه نصايح العناية والمتابعة المناسبة؟`)
        : (data.label === 'Malignant'
          ? `I just uploaded a skin image. The AI classified it as Malignant with an affected area of ${data.infection_pct}%. Please give me detailed recommendations and next steps.`
          : `I just uploaded a skin image. The AI classified it as Benign with ${data.infection_pct}% affected area. What general care tips should I follow?`);
      sendToAgent(autoMsg, false);
    });

    window.registerImage = async function (btn) {
      const pid = document.getElementById('pidInput').value.trim();
      if (!pid) return;
      if (!lastAnalyzedFile) {
        addMsg('⚠️ ' + (lang === 'ar' ? 'الصورة مش محفوظة، ارفعها تاني وحاول تسجّل فورًا.' : 'Image not available anymore, please re-upload and register right away.'), 'system');
        return;
      }
      const fd = new FormData();
      fd.append('thread_id', threadId);
      fd.append('patient_id', pid);
      fd.append('file', lastAnalyzedFile);
      const res = await fetch(`${API_BASE}/register-image`, { method: 'POST', body: fd }).then(r => r.json());
      addMsg(res.ok ? res.message : ('⚠️ ' + res.error), 'system');
    };

    window.bookAppointment = async function (btn) {
      const cityEl = document.getElementById('cityInput');
      const city = cityEl ? cityEl.value : '';
      const res = await fetch(`${API_BASE}/book-appointment`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ thread_id: threadId, city })
      }).then(r => r.json());
      addMsg(res.ok ? res.ticket : ('⚠️ ' + res.error), 'bot');
    };

    async function sendToAgent(message, showUserMsg = true) {
      if (showUserMsg) addMsg(message, 'user');
      const typing = addMsg('<span class="typing">💭 ' + (lang === 'ar' ? 'بيفكر...' : 'Thinking...') + '</span>', 'bot');
      let data;
      try {
        data = await fetch(`${API_BASE}/chat`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ thread_id: threadId, message })
        }).then(r => r.json());
      } catch (e) {
        typing.remove();
        addMsg('⚠️ ' + String(e), 'system');
        return;
      }
      typing.remove();
      if (data.ok && data.notice) {
        addMsg('ℹ️ ' + data.notice, 'system');
      }

      let replyText = data.ok ? data.reply : ('⚠️ ' + data.error);

      // Check for [ANALYSIS_RESULT:{json}] marker
      const analysisMatch = replyText.match(/^\[ANALYSIS_RESULT:(\{.*?\})\]\s*/);
      let analysisCardHtml = '';
      if (analysisMatch && data.ok) {
        try {
          const result = JSON.parse(analysisMatch[1]);
          replyText = replyText.substring(analysisMatch[0].length);

          const badgeClass = result.label === 'Malignant' ? 'result-mal' : (result.label ? 'result-ben' : '');
          let badgeText = '';
          if (result.label) {
            badgeText = result.label === 'Malignant'
              ? `⚠️ Malignant — ${result.confidence_pct}%`
              : `✔ Benign — ${result.confidence_pct}%`;
          }

          let card = '<div class="analysis-card">';
          if (badgeText) {
            card += `<span class="result-badge ${badgeClass}">${badgeText}</span>`;
          }

          if (result.infection_pct > 0) {
            card += `<div>📊 ${lang === 'ar' ? 'المساحة المصابة' : 'Affected area'}: <b>${result.infection_pct}%</b></div>`;
          }

          card += '</div>';
          analysisCardHtml = card;
        } catch (e) {
          console.log('Failed to parse analysis result:', e);
        }
      }

      // Show analysis card first
      if (analysisCardHtml) {
        addMsg(analysisCardHtml, 'bot');
      }

      // Build images HTML from [IMAGE:] markers
      let imagesHtml = '';
      if (data.ok && data.images && data.images.length > 0) {
        for (const imgPath of data.images) {
          try {
            const imgRes = await fetch(`${API_BASE}/image?path=${encodeURIComponent(imgPath)}`).then(r => r.json());
            if (imgRes.ok && imgRes.base64) {
              imagesHtml += `<br><img src="data:${imgRes.media_type};base64,${imgRes.base64}" style="max-width:100%; border-radius:8px; margin-top:12px; max-height:400px;">`;
            }
          } catch (e) {
            console.log('Failed to load image:', imgPath, e);
          }
        }
      }

      // Show text + images together
      let msgHtml = replyText;
      if (imagesHtml) {
        msgHtml += imagesHtml;
      }
      if (msgHtml) {
        addMsg(msgHtml, 'bot');
      }
    }

    document.getElementById('sendBtn').addEventListener('click', () => {
      const val = textInput.value.trim();
      if (!val) return;
      textInput.value = '';
      sendToAgent(val);
    });
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { document.getElementById('sendBtn').click(); }
    });
  </script>

</body>

</html>
